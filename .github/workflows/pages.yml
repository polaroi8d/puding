name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site
          {
            printf '<!doctype html><html><head><meta charset=utf-8>'
            printf '<title>puding — model results</title>'
            printf '<style>body{font-family:sans-serif;max-width:700px;margin:2rem auto}'
            printf 'h2{margin-top:2rem}ul{padding-left:1.2rem}</style>'
            printf '</head><body><h1>puding results</h1>\n'

            # Group entries by prompt
            declare -A prompt_entries
            for app_dir in models/*/*/app/; do
              [ -d "$app_dir" ] || continue
              prompt=$(basename "$(dirname "$app_dir")")
              model=$(basename "$(dirname "$(dirname "$app_dir")")")
              # pick the first file in app/ as the entry point
              entry=$(ls "$app_dir" | head -1)
              [ -n "$entry" ] || continue
              dest="_site/$model/$prompt"
              mkdir -p "$dest"
              cp -r "$app_dir/." "$dest/"
              prompt_entries["$prompt"]+="<li><a href=\"$model/$prompt/$entry\">$model</a></li>\n"
            done

            for prompt in $(echo "${!prompt_entries[@]}" | tr ' ' '\n' | sort); do
              printf '<h2>%s</h2><ul>\n' "$prompt"
              printf '%b' "${prompt_entries[$prompt]}"
              printf '</ul>\n'
            done

            printf '</body></html>\n'
          } > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
