name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site
          {
            printf '<!doctype html><html><head><meta charset=utf-8>'
            printf '<title>puding — model results</title>'
            printf '<style>body{font-family:sans-serif;max-width:600px;margin:2rem auto}</style>'
            printf '</head><body><h1>puding results</h1><ul>\n'
            for dir in models/*/; do
              name=$(basename "$dir")
              src="$dir/app/index.html"
              if [ -f "$src" ]; then
                mkdir -p "_site/$name"
                cp "$src" "_site/$name/index.html"
                printf '<li><a href="%s/">%s</a></li>\n' "$name" "$name"
              fi
            done
            printf '</ul></body></html>\n'
          } > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
