    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Todo App</title>
        <style>
            /* CSS styles */
        </style>
    </head>
    <body>
        <div id="app">
            <h1>Todos</h1>
            <div class="input-container">
                <input type="text" id="new-todo-input" data-testid="new-todo-input" placeholder="What needs to be done?">
                <button id="add-todo" data-testid="add-todo">Add</button>
            </div>
            <div class="filters">
                <button data-testid="filter-all" class="filter-btn">All</button>
                <button data-testid="filter-active" class="filter-btn">Active</button>
                <button data-testid="filter-completed" class="filter-btn">Completed</button>
            </div>
            <ul id="todo-list" data-testid="todo-list"></ul>
            <div class="footer">
                <span id="active-count" data-testid="active-count">0</span> active items
                <button id="clear-completed" data-testid="clear-completed">Clear completed</button>
            </div>
        </div>
        <script>
            // JS logic
        </script>
    </body>
    </html>
