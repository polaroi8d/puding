<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="800" height="600" fill="#e8f4f8"/>
  <path d="M 0 520 Q 200 510 400 525 T 800 520 L 800 600 L 0 600 Z" fill="#d4efdf"/>

  <!-- Bicycle Wheels -->
  <g id="rear-wheel">
    <circle cx="220" cy="450" r="85" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="220" cy="450" r="78" fill="none" stroke="#ccc" stroke-width="2"/>
    <g stroke="#bbb" stroke-width="2">
      <line x1="220" y1="365" x2="220" y2="535"/>
      <line x1="135" y1="450" x2="305" y2="450"/>
      <line x1="160" y1="390" x2="280" y2="510"/>
      <line x1="280" y1="390" x2="160" y2="510"/>
    </g>
  </g>
  <g id="front-wheel">
    <circle cx="480" cy="450" r="85" fill="none" stroke="#333" stroke-width="6"/>
    <circle cx="480" cy="450" r="78" fill="none" stroke="#ccc" stroke-width="2"/>
    <g stroke="#bbb" stroke-width="2">
      <line x1="480" y1="365" x2="480" y2="535"/>
      <line x1="395" y1="450" x2="565" y2="450"/>
      <line x1="420" y1="390" x2="540" y2="510"/>
      <line x1="540" y1="390" x2="420" y2="510"/>
    </g>
  </g>

  <!-- Bicycle Frame -->
  <g stroke="#2c3e50" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="220" y1="450" x2="350" y2="450"/>
    <line x1="350" y1="450" x2="280" y2="320"/>
    <line x1="280" y1="320" x2="430" y2="330"/>
    <line x1="350" y1="450" x2="430" y2="330"/>
    <line x1="430" y1="330" x2="480" y2="450"/>
  </g>

  <!-- Chain -->
  <path d="M 220 450 Q 285 462 350 450" fill="none" stroke="#777" stroke-width="3" stroke-dasharray="4,4"/>

  <!-- Seat -->
  <ellipse cx="280" cy="316" rx="26" ry="9" fill="#34495e"/>

  <!-- Handlebars -->
  <g stroke="#2c3e50" stroke-width="6" fill="none" stroke-linecap="round">
    <line x1="430" y1="330" x2="430" y2="270"/>
    <path d="M 430 270 Q 430 250 410 250 L 360 250"/>
  </g>
  <circle cx="360" cy="250" r="9" fill="#34495e"/>
  <circle cx="430" cy="270" r="9" fill="#34495e"/>

  <!-- Pelican Body -->
  <path d="M 265 265 Q 258 225 285 205 Q 315 185 345 200 Q 375 215 368 260 Q 360 305 330 315 Q 300 325 280 305 Q 260 285 265 265 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Pelican Neck -->
  <path d="M 325 210 Q 330 185 340 170 Q 345 160 352 155" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round"/>

  <!-- Pelican Head -->
  <circle cx="358" cy="150" r="22" fill="#ffffff"/>

  <!-- Pelican Beak -->
  <path d="M 380 145 L 450 135 L 453 140 L 382 152 Z" fill="#ffb347" stroke="#e68a00" stroke-width="1.5"/>

  <!-- Pelican Pouch -->
  <path d="M 382 154 Q 410 170 440 162 L 430 200 Q 410 220 385 195 Z" fill="#ffcc80" stroke="#e68a00" stroke-width="1.5"/>

  <!-- Pelican Eye -->
  <circle cx="365" cy="143" r="3.5" fill="#000000"/>
  <circle cx="366" cy="142" r="1.2" fill="#ffffff"/>

  <!-- Pelican Left Wing (folded) -->
  <path d="M 285 240 Q 265 265 275 295 Q 295 310 320 290 Q 335 270 315 250 Z" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Pelican Right Wing (reaching handlebar) -->
  <path d="M 330 248 Q 345 230 358 235 Q 365 238 368 246" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
  <ellipse cx="370" cy="248" rx="11" ry="7" fill="#2c3e50" transform="rotate(-20 370 248)"/>

  <!-- Pelican Legs -->
  <path d="M 300 305 Q 295 380 320 432 L 332 438" fill="none" stroke="#ff8c00" stroke-width="9" stroke-linecap="round"/>
  <path d="M 330 305 Q 340 380 360 452 L 368 460" fill="none" stroke="#ff8c00" stroke-width="11" stroke-linecap="round"/>

  <!-- Pelican Feet -->
  <ellipse cx="335" cy="438" rx="16" ry="6" fill="#ff8c00" transform="rotate(-25 335 438)"/>
  <ellipse cx="365" cy="462" rx="16" ry="6" fill="#ff8c00" transform="rotate(155 365 462)"/>

  <!-- Crank and Pedals -->
  <circle cx="350" cy="450" r="14" fill="#444444"/>
  <rect x="326" y="434" width="28" height="8" rx="3" fill="#222222" transform="rotate(-25 340 438)"/>
  <rect x="356" y="456" width="28" height="8" rx="3" fill="#222222" transform="rotate(155 370 460)"/>
</svg>