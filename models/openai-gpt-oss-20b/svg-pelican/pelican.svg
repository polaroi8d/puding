<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <!-- Bicycle -->
  <g id="bicycle" stroke="black" stroke-width="4" fill="none">
    <!-- Frame -->
    <line x1="70" y1="140" x2="130" y2="70"/>
    <line x1="130" y1="70" x2="250" y2="70"/>
    <line x1="250" y1="70" x2="270" y2="140"/>
    <line x1="70" y1="140" x2="250" y2="140"/>
    <!-- Wheels -->
    <circle cx="70" cy="140" r="20"/>
    <circle cx="270" cy="140" r="20"/>
  </g>
  <!-- Pelican -->
  <g id="pelican" stroke="black" stroke-width="2" fill="#b0e0e6">
    <!-- Body -->
    <ellipse cx="150" cy="90" rx="30" ry="45"/>
    <!-- Head -->
    <circle cx="150" cy="45" r="20"/>
    <!-- Beak -->
    <polygon points="150,45 180,60 140,65"/>
    <!-- Wings -->
    <path d="M120,90 Q115,110 140,100" fill="#90c0e0"/>
    <path d="M180,90 Q185,110 160,100" fill="#90c0e0"/>
    <!-- Legs -->
    <line x1="140" y1="135" x2="145" y2="160"/>
    <line x1="160" y1="135" x2="155" y2="160"/>
    <!-- Tail -->
    <polygon points="120,135 110,150 140,150"/>
  </g>
</svg>