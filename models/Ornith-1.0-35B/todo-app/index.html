<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 520px; margin: 40px auto; padding: 0 20px; color: #333; background: #f9f9f9;
  }
  h1 { text-align: center; color: #4a4a4a; margin-bottom: 24px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .input-row input {
    flex: 1; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 15px; outline: none;
  }
  .input-row input:focus { border-color: #4a90d9; }
  .input-row button {
    padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer;
    font-size: 15px; font-weight: 600;
  }
  #add-todo { background: #4a90d9; color: #fff; }
  #add-todo:hover { background: #357abd; }
  .filters { display: flex; gap: 4px; margin-bottom: 12px; }
  .filters button {
    padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px;
    background: #fff; cursor: pointer; font-size: 13px;
  }
  .filters button.active {
    background: #4a90d9; color: #fff; border-color: #4a90d9;
  }
  #todo-list { list-style: none; padding: 0; margin: 0 0 16px 0; }
  .todo-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    background: #fff; border: 1px solid #e0e0e0; border-radius: 4px;
    margin-bottom: 4px;
  }
  .todo-item input[type="checkbox"] {
    width: 18px; height: 18px; cursor: pointer; flex-shrink: 0;
  }
  .todo-item span { flex: 1; font-size: 15px; word-break: break-word; }
  .todo-item.done span { text-decoration: line-through; color: #999; }
  .todo-item .delete-btn {
    padding: 4px 10px; border: 1px solid #e0e0e0; border-radius: 4px;
    background: #fff; cursor: pointer; font-size: 13px; color: #c00;
  }
  .todo-item .delete-btn:hover { background: #fee; }
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; color: #666;
  }
  #clear-completed {
    padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px;
    background: #fff; cursor: pointer; font-size: 13px;
  }
  #clear-completed:hover { background: #f0f0f0; }
</style>
</head>
<body>
<h1>Todos</h1>

<div class="input-row">
  <input type="text" id="new-todo-input" placeholder="What needs to be done?">
  <button id="add-todo">Add</button>
</div>

<div class="filters">
  <button data-testid="filter-all" class="active">All</button>
  <button data-testid="filter-active">Active</button>
  <button data-testid="filter-completed">Completed</button>
</div>

<ul id="todo-list"></ul>

<div class="footer">
  <span data-testid="active-count">0</span>
  <button id="clear-completed">Clear completed</button>
</div>

<script>
(function() {
  const STORAGE_KEY = 'todos';
  let todos = [];
  let currentFilter = 'all';

  // --- Persistence ---
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          todos = parsed.filter(t => t && typeof t.id === 'string' && typeof t.text === 'string' && typeof t.completed === 'boolean');
        }
      }
    } catch(e) {
      todos = [];
    }
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    } catch(e) { /* ignore */ }
  }

  // --- Rendering ---
  function getFiltered() {
    if (currentFilter === 'active') return todos.filter(t => !t.completed);
    if (currentFilter === 'completed') return todos.filter(t => t.completed);
    return todos;
  }

  function render() {
    const list = document.getElementById('todo-list');
    const filtered = getFiltered();
    list.innerHTML = '';

    filtered.forEach(todo => {
      const li = document.createElement('li');
      li.setAttribute('data-testid', 'todo-item');
      li.setAttribute('data-completed', String(todo.completed));
      if (todo.completed) li.classList.add('done');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.setAttribute('data-testid', 'toggle-todo');
      checkbox.checked = todo.completed;
      checkbox.addEventListener('change', () => toggleTodo(todo.id));

      const span = document.createElement('span');
      span.setAttribute('data-testid', 'todo-text');
      span.textContent = todo.text.trim();

      const delBtn = document.createElement('button');
      delBtn.setAttribute('data-testid', 'delete-todo');
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', () => deleteTodo(todo.id));

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(delBtn);
      list.appendChild(li);
    });

    // Active count
    const activeCount = todos.filter(t => !t.completed).length;
    document.querySelector('[data-testid="active-count"]').textContent = String(activeCount);

    // Filter buttons
    document.querySelectorAll('.filters button').forEach(btn => {
      btn.classList.remove('active');
    });
    if (currentFilter === 'all') document.querySelector('[data-testid="filter-all"]').classList.add('active');
    else if (currentFilter === 'active') document.querySelector('[data-testid="filter-active"]').classList.add('active');
    else if (currentFilter === 'completed') document.querySelector('[data-testid="filter-completed"]').classList.add('active');
  }

  // --- Actions ---
  function addTodo() {
    const input = document.getElementById('new-todo-input');
    const text = input.value.trim();
    if (!text) return;
    todos.push({ id: crypto.randomUUID(), text: text, completed: false });
    input.value = '';
    save();
    render();
  }

  function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (todo) {
      todo.completed = !todo.completed;
      save();
      render();
    }
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    render();
  }

  function clearCompleted() {
    todos = todos.filter(t => !t.completed);
    save();
    render();
  }

  function setFilter(filter) {
    currentFilter = filter;
    render();
  }

  // --- Event bindings ---
  document.getElementById('add-todo').addEventListener('click', addTodo);
  document.getElementById('new-todo-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTodo();
  });

  document.querySelector('[data-testid="filter-all"]').addEventListener('click', () => setFilter('all'));
  document.querySelector('[data-testid="filter-active"]').addEventListener('click', () => setFilter('active'));
  document.querySelector('[data-testid="filter-completed"]').addEventListener('click', () => setFilter('completed'));

  document.getElementById('clear-completed').addEventListener('click', clearCompleted);

  // --- Init ---
  load();
  render();
})();
</script>
</body>
</html>
