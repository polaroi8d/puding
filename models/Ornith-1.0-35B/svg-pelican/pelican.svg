<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Ground -->
  <ellipse cx="200" cy="350" rx="180" ry="15" fill="#e8e8e8"/>
  
  <!-- Bicycle Back Wheel -->
  <circle cx="140" cy="300" r="45" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="140" cy="300" r="40" fill="none" stroke="#555" stroke-width="1.5"/>
  <circle cx="140" cy="300" r="5" fill="#333"/>
  <!-- Back wheel spokes -->
  <line x1="140" y1="258" x2="140" y2="342" stroke="#888" stroke-width="1"/>
  <line x1="98" y1="300" x2="182" y2="300" stroke="#888" stroke-width="1"/>
  <line x1="105" y1="268" x2="175" y2="332" stroke="#888" stroke-width="1"/>
  <line x1="105" y1="332" x2="175" y2="268" stroke="#888" stroke-width="1"/>
  
  <!-- Bicycle Front Wheel -->
  <circle cx="270" cy="300" r="45" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="270" cy="300" r="40" fill="none" stroke="#555" stroke-width="1.5"/>
  <circle cx="270" cy="300" r="5" fill="#333"/>
  <!-- Front wheel spokes -->
  <line x1="270" y1="258" x2="270" y2="342" stroke="#888" stroke-width="1"/>
  <line x1="228" y1="300" x2="312" y2="300" stroke="#888" stroke-width="1"/>
  <line x1="235" y1="268" x2="305" y2="332" stroke="#888" stroke-width="1"/>
  <line x1="235" y1="332" x2="305" y2="268" stroke="#888" stroke-width="1"/>
  
  <!-- Bicycle Frame -->
  <path d="M140 300 L195 230 L265 225" fill="none" stroke="#e74c3c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M140 300 L210 295 L265 225" fill="none" stroke="#e74c3c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M195 230 L210 295" fill="none" stroke="#e74c3c" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Seat Post -->
  <line x1="195" y1="230" x2="188" y2="210" stroke="#333" stroke-width="4"/>
  
  <!-- Seat -->
  <ellipse cx="185" cy="207" rx="18" ry="8" fill="#5d4037"/>
  
  <!-- Handlebar Post -->
  <line x1="265" y1="225" x2="275" y2="195" stroke="#333" stroke-width="4"/>
  
  <!-- Handlebars -->
  <path d="M260 195 Q275 185 290 195" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <circle cx="260" cy="195" r="4" fill="#333"/>
  <circle cx="290" cy="195" r="4" fill="#333"/>
  
  <!-- Crank/Pedal area -->
  <circle cx="210" cy="295" r="10" fill="none" stroke="#555" stroke-width="3"/>
  
  <!-- Pedal Left -->
  <rect x="198" y="305" width="16" height="6" rx="2" fill="#333"/>
  <line x1="210" y1="295" x2="206" y2="305" stroke="#555" stroke-width="3"/>
  
  <!-- Pedal Right -->
  <rect x="220" y="283" width="16" height="6" rx="2" fill="#333"/>
  <line x1="210" y1="295" x2="228" y2="286" stroke="#555" stroke-width="3"/>
  
  <!-- ===== PELICAN ===== -->
  
  <!-- Pelican Body -->
  <ellipse cx="205" cy="175" rx="35" ry="28" fill="white" stroke="#ddd" stroke-width="1"/>
  
  <!-- Pelican Tail feathers -->
  <path d="M172 170 Q155 165 150 175 Q158 172 172 178" fill="white" stroke="#ddd" stroke-width="1"/>
  <path d="M170 175 Q152 173 148 182 Q156 178 170 182" fill="white" stroke="#ddd" stroke-width="1"/>
  
  <!-- Pelican Wing -->
  <path d="M190 165 Q180 180 195 195 Q210 185 215 165" fill="#f5f5f5" stroke="#ddd" stroke-width="1.5"/>
  <path d="M185 172 Q182 182 192 190" fill="none" stroke="#ddd" stroke-width="1"/>
  
  <!-- Pelican Neck -->
  <path d="M220 160 Q235 140 238 120 Q240 105 235 95" fill="none" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <path d="M220 160 Q235 140 238 120 Q240 105 235 95" fill="none" stroke="#eee" stroke-width="20" stroke-linecap="round"/>
  
  <!-- Pelican Head -->
  <ellipse cx="235" cy="90" rx="18" ry="16" fill="white" stroke="#ddd" stroke-width="1"/>
  
  <!-- Pelican Eye -->
  <circle cx="240" cy="85" r="5" fill="white"/>
  <circle cx="241" cy="85" r="3" fill="#333"/>
  <circle cx="242" cy="84" r="1" fill="white"/>
  
  <!-- Pelican Beak (upper) -->
  <path d="M250 88 Q270 85 295 88 Q280 90 250 92" fill="#f4a460" stroke="#e8944a" stroke-width="1"/>
  
  <!-- Pelican Beak pouch (lower) -->
  <path d="M250 92 Q275 105 290 92 Q275 96 250 92" fill="#f4a460" stroke="#e8944a" stroke-width="1" opacity="0.9"/>
  
  <!-- Pelican Crest on head -->
  <path d="M222 80 Q218 70 225 68" fill="none" stroke="#f4a460" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Pelican Left Foot (on pedal) -->
  <path d="M205 200 Q200 220 195 240 Q192 255 198 270" fill="none" stroke="#f4a460" stroke-width="4" stroke-linecap="round"/>
  <path d="M198 270 L195 280 M198 270 L202 278 M198 270 L206 275" fill="none" stroke="#f4a460" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Pelican Right Foot (on pedal) -->
  <path d="M225 195 Q230 215 235 235 Q238 255 232 275" fill="none" stroke="#f4a460" stroke-width="4" stroke-linecap="round"/>
  <path d="M232 275 L228 285 M232 275 L236 283 M232 275 L240 280" fill="none" stroke="#f4a460" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Pelican Left Wing (reaching to handlebar) -->
  <path d="M220 165 Q240 160 260 170 Q275 180 285 190" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <path d="M220 165 Q240 160 260 170 Q275 180 285 190" fill="none" stroke="#f0f0f0" stroke-width="5" stroke-linecap="round"/>
  <!-- Left wing tip (hand on handlebar) -->
  <circle cx="287" cy="192" r="5" fill="#f4a460"/>
  
  <!-- Movement lines -->
  <line x1="100" y1="280" x2="75" y2="280" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="290" x2="70" y2="290" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
  <line x1="95" y1="300" x2="78" y2="300" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Small flower decorations on ground -->
  <circle cx="60" cy="345" r="4" fill="#ff9" stroke="#f4a460" stroke-width="1"/>
  <circle cx="340" cy="342" r="3" fill="#f9f" stroke="#f4a460" stroke-width="1"/>
  <circle cx="320" cy="348" r="3.5" fill="#9ff" stroke="#f4a460" stroke-width="1"/>
</svg>