<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; display: flex; justify-content: center; padding: 40px 16px; }
  .app { width: 100%; max-width: 480px; }
  h1 { text-align: center; font-size: 2rem; font-weight: 300; letter-spacing: 2px; color: #4a4a4a; margin-bottom: 24px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  #new-todo-input { flex: 1; padding: 10px 14px; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px; outline: none; }
  #new-todo-input:focus { border-color: #666; }
  #add-todo { padding: 10px 18px; font-size: 1rem; background: #4a90d9; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  #add-todo:hover { background: #3a7bc8; }
  .filters { display: flex; gap: 6px; margin-bottom: 12px; }
  .filters button { padding: 6px 14px; font-size: .85rem; border: 1px solid #ccc; background: #fff; border-radius: 4px; cursor: pointer; }
  .filters button.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
  #todo-list { list-style: none; }
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 6px; }
  .todo-item[data-completed="true"] .todo-text { text-decoration: line-through; color: #999; }
  #toggle-todo { width: 18px; height: 18px; cursor: pointer; accent-color: #4a90d9; }
  .todo-text { flex: 1; font-size: .95rem; }
  #delete-todo { background: none; border: none; color: #c00; cursor: pointer; font-size: 1.1rem; padding: 2px 6px; border-radius: 4px; }
  #delete-todo:hover { background: #fee; }
  .footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; font-size: .85rem; color: #666; }
  #active-count { font-weight: 600; }
  #clear-completed { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: .8rem; color: #666; }
  #clear-completed:hover { background: #eee; }
</style>
</head>
<body>
<div class="app">
  <h1>Todos</h1>
  <div class="input-row">
    <input id="new-todo-input" type="text" placeholder="What needs to be done?" />
    <button id="add-todo">Add</button>
  </div>
  <div class="filters">
    <button data-testid="filter-all" class="active">All</button>
    <button data-testid="filter-active">Active</button>
    <button data-testid="filter-completed">Completed</button>
  </div>
  <div data-testid="todo-list"></div>
  <div class="footer">
    <span>Active: <span id="active-count">0</span></span>
    <button id="clear-completed">Clear completed</button>
  </div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'todos';
  let todos = [];
  let filter = 'all';

  const input = document.getElementById('new-todo-input');
  const addBtn = document.getElementById('add-todo');
  const listEl = document.querySelector('[data-testid="todo-list"]');
  const activeCountEl = document.getElementById('active-count');
  const clearBtn = document.getElementById('clear-completed');
  const filterBtns = document.querySelectorAll('.filters button');

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) todos = parsed;
      }
    } catch(e) { todos = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function addTodo() {
    const text = input.value.trim();
    if (!text) return;
    todos.push({ id: crypto.randomUUID(), text, completed: false });
    input.value = '';
    save();
    render();
  }

  function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (todo) { todo.completed = !todo.completed; save(); render(); }
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    render();
  }

  function clearCompleted() {
    todos = todos.filter(t => !t.completed);
    save();
    render();
  }

  function setFilter(f) {
    filter = f;
    filterBtns.forEach(b => {
      const key = b.getAttribute('data-testid');
      const ftype = key.replace('filter-', '');
      b.classList.toggle('active', ftype === filter);
    });
    render();
  }

  function render() {
    const filtered = todos.filter(t => {
      if (filter === 'active') return !t.completed;
      if (filter === 'completed') return t.completed;
      return true;
    });

    listEl.innerHTML = '';
    filtered.forEach(todo => {
      const item = document.createElement('div');
      item.setAttribute('data-testid', 'todo-item');
      item.setAttribute('data-completed', String(todo.completed));

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.setAttribute('data-testid', 'toggle-todo');
      cb.checked = todo.completed;
      cb.addEventListener('click', () => toggleTodo(todo.id));

      const textSpan = document.createElement('span');
      textSpan.setAttribute('data-testid', 'todo-text');
      textSpan.textContent = todo.text;

      const delBtn = document.createElement('button');
      delBtn.setAttribute('data-testid', 'delete-todo');
      delBtn.textContent = '\u00d7';
      delBtn.addEventListener('click', () => deleteTodo(todo.id));

      item.appendChild(cb);
      item.appendChild(textSpan);
      item.appendChild(delBtn);
      listEl.appendChild(item);
    });

    const active = todos.filter(t => !t.completed).length;
    activeCountEl.textContent = String(active);
  }

  addBtn.addEventListener('click', addTodo);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
  clearBtn.addEventListener('click', clearCompleted);
  filterBtns.forEach(b => b.addEventListener('click', () => setFilter(b.getAttribute('data-testid').replace('filter-', ''))));

  load();
  render();
})();
</script>
</body>
</html>
