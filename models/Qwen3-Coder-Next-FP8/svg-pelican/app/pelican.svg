<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#e0f7fa"/>
  <rect y="350" width="600" height="50" fill="#4caf50"/>
  <path d="M0,350 Q300,320 600,350" fill="none" stroke="#66bb6a" stroke-width="3"/>
  
  <!-- Bicycle -->
  <g id="bike" transform="translate(180, 200)">
    <!-- Rear Wheel -->
    <circle cx="-60" cy="60" r="35" fill="#333" stroke="#666" stroke-width="2"/>
    <circle cx="-60" cy="60" r="35" fill="none" stroke="#ddd" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="-60" y1="60" x2="-30" y2="60" stroke="#999" stroke-width="2"/>
    <line x1="-60" y1="60" x2="-60" y2="90" stroke="#999" stroke-width="2"/>
    
    <!-- Front Wheel -->
    <circle cx="60" cy="60" r="35" fill="#333" stroke="#666" stroke-width="2"/>
    <circle cx="60" cy="60" r="35" fill="none" stroke="#ddd" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="60" y1="60" x2="90" y2="60" stroke="#999" stroke-width="2"/>
    <line x1="60" y1="60" x2="60" y2="90" stroke="#999" stroke-width="2"/>
    
    <!-- Frame -->
    <path d="M-30,60 L0,30 L30,60 L60,60" fill="none" stroke="#ff7043" stroke-width="4"/>
    <path d="M-30,60 L-30,110 L0,130 L30,110 L60,60" fill="none" stroke="#ff7043" stroke-width="4"/>
    <path d="M-30,110 L0,140" fill="none" stroke="#ff7043" stroke-width="4"/>
    
    <!-- Handlebars -->
    <path d="M60,60 L70,30" fill="none" stroke="#555" stroke-width="3"/>
    <line x1="70" y1="30" x2="80" y2="30" stroke="#555" stroke-width="3"/>
    
    <!-- Seat -->
    <ellipse cx="-30" cy="110" rx="15" ry="5" fill="#333"/>
    <line x1="-30" y1="110" x2="-30" y2="125" stroke="#555" stroke-width="2"/>
    <line x1="-30" y1="125" x2="-45" y2="130" stroke="#555" stroke-width="2"/>
    <line x1="-30" y1="125" x2="-15" y2="130" stroke="#555" stroke-width="2"/>
    
    <!-- Pedals -->
    <circle cx="0" cy="130" r="6" fill="#333"/>
    <line x1="0" y1="130" x2="-20" y2="160" stroke="#777" stroke-width="4"/>
    <circle cx="-20" cy="160" r="6" fill="#333"/>
    <line x1="0" y1="130" x2="20" y2="160" stroke="#777" stroke-width="4"/>
    <circle cx="20" cy="160" r="6" fill="#333"/>
  </g>
  
  <!-- Pelican -->
  <g id="pelican" transform="translate(320, 150)">
    <!-- Legs -->
    <line x1="0" y1="0" x2="0" y2="30" stroke="#ffcc80" stroke-width="4"/>
    <line x1="10" y1="0" x2="10" y2="30" stroke="#ffcc80" stroke-width="4"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="50" ry="70" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
    
    <!-- Head -->
    <circle cx="20" cy="-60" r="35" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
    
    <!-- Eyes -->
    <circle cx="28" cy="-70" r="5" fill="#333"/>
    <circle cx="28" cy="-70" r="2" fill="#fff"/>
    
    <!-- Beak (Upper) -->
    <path d="M35,-60 Q100,-80 120,-60 Q100,-50 35,-50" fill="#ff7043" stroke="#e65100" stroke-width="1"/>
    
    <!-- Beak (Lower) -->
    <path d="M35,-50 Q80,-40 110,-30" fill="#f57c00" stroke="#e65100" stroke-width="1"/>
    
    <!-- Pouch -->
    <path d="M35,-50 Q60,10 110,-30" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>
    
    <!-- Wings -->
    <path d="M-40,-20 Q-30,-60 0,-50 L10,20" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
    <path d="M-40,-20 Q-60,-50 -50,-80" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    
    <!-- Tail -->
    <path d="M-50,20 Q-80,10 -70,-10" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
    
    <!-- Legs on pedals -->
    <line x1="0" y1="30" x2="0" y2="40" stroke="#ffcc80" stroke-width="4"/>
    <line x1="10" y1="30" x2="10" y2="40" stroke="#ffcc80" stroke-width="4"/>
  </g>
  
  <!-- Speech Bubble -->
  <path d="M450,80 Q480,60 500,80 Q520,60 530,90 Q540,100 520,110 L480,90" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <path d="M470,90 L450,80" stroke="#ccc" stroke-width="1"/>
  <text x="490" y="95" font-family="Arial" font-size="16" text-anchor="middle" fill="#333">Wow, this is fun!</text>
</svg>