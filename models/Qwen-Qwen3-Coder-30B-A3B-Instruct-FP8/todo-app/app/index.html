<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
    }
    #new-todo-input {
      width: 70%;
      padding: 10px;
      box-sizing: border-box;
    }
    #add-todo {
      width: 25%;
      padding: 10px;
    }
    #todo-list {
      margin-top: 20px;
    }
    .todo-item {
      display: flex;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
    .todo-item[data-completed="true"] .todo-text {
      text-decoration: line-through;
      color: #888;
    }
    .toggle-todo {
      margin-right: 10px;
    }
    .delete-todo {
      margin-left: auto;
      background: none;
      border: none;
      color: #ff4757;
      cursor: pointer;
    }
    .filters {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
    }
    .filter-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px 10px;
    }
    .filter-btn.active {
      font-weight: bold;
      border-bottom: 2px solid #000;
    }
    #clear-completed {
      margin-top: 10px;
      background: none;
      border: none;
      color: #ff4757;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Todo App</h1>
  <div>
    <input type="text" id="new-todo-input" data-testid="new-todo-input" placeholder="What needs to be done?">
    <button id="add-todo" data-testid="add-todo">Add</button>
  </div>
  <div id="todo-list" data-testid="todo-list"></div>
  <div class="filters">
    <button class="filter-btn active" id="filter-all" data-testid="filter-all">All</button>
    <button class="filter-btn" id="filter-active" data-testid="filter-active">Active</button>
    <button class="filter-btn" id="filter-completed" data-testid="filter-completed">Completed</button>
  </div>
  <div>
    <span id="active-count" data-testid="active-count">0</span> items left
  </div>
  <button id="clear-completed" data-testid="clear-completed">Clear completed</button>

  <script>
    // Load todos from localStorage
    let todos = JSON.parse(localStorage.getItem('todos')) || [];
    let currentFilter = 'all';

    // DOM Elements
    const newTodoInput = document.getElementById('new-todo-input');
    const addTodoBtn = document.getElementById('add-todo');
    const todoList = document.getElementById('todo-list');
    const filterAllBtn = document.getElementById('filter-all');
    const filterActiveBtn = document.getElementById('filter-active');
    const filterCompletedBtn = document.getElementById('filter-completed');
    const activeCountSpan = document.getElementById('active-count');
    const clearCompletedBtn = document.getElementById('clear-completed');

    // Render todos based on current filter
    function renderTodos() {
      todoList.innerHTML = '';
      let activeCount = 0;

      let filteredTodos = todos;
      if (currentFilter === 'active') {
        filteredTodos = todos.filter(todo => !todo.completed);
      } else if (currentFilter === 'completed') {
        filteredTodos = todos.filter(todo => todo.completed);
      }

      filteredTodos.forEach(todo => {
        const todoItem = document.createElement('div');
        todoItem.className = 'todo-item';
        todoItem.setAttribute('data-testid', 'todo-item');
        todoItem.setAttribute('data-completed', todo.completed ? 'true' : 'false');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'toggle-todo';
        checkbox.setAttribute('data-testid', 'toggle-todo');
        checkbox.checked = todo.completed;
        checkbox.addEventListener('change', () => toggleTodo(todo.id));

        const span = document.createElement('span');
        span.className = 'todo-text';
        span.setAttribute('data-testid', 'todo-text');
        span.textContent = todo.text;

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-todo';
        deleteBtn.setAttribute('data-testid', 'delete-todo');
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', () => deleteTodo(todo.id));

        todoItem.appendChild(checkbox);
        todoItem.appendChild(span);
        todoItem.appendChild(deleteBtn);
        todoList.appendChild(todoItem);

        if (!todo.completed) activeCount++;
      });

      activeCountSpan.textContent = activeCount;
    }

    // Save todos to localStorage
    function saveTodos() {
      localStorage.setItem('todos', JSON.stringify(todos));
      renderTodos();
    }

    // Add new todo
    function addTodo() {
      const text = newTodoInput.value.trim();
      if (!text) return;

      const newTodo = {
        id: crypto.randomUUID(),
        text: text,
        completed: false
      };

      todos.push(newTodo);
      saveTodos();
      newTodoInput.value = '';
    }

    // Toggle todo completion
    function toggleTodo(id) {
      todos = todos.map(todo => 
        todo.id === id ? { ...todo, completed: !todo.completed } : todo
      );
      saveTodos();
    }

    // Delete todo
    function deleteTodo(id) {
      todos = todos.filter(todo => todo.id !== id);
      saveTodos();
    }

    // Set filter
    function setFilter(filter) {
      currentFilter = filter;
      filterAllBtn.classList.toggle('active', filter === 'all');
      filterActiveBtn.classList.toggle('active', filter === 'active');
      filterCompletedBtn.classList.toggle('active', filter === 'completed');
      renderTodos();
    }

    // Clear completed todos
    function clearCompleted() {
      todos = todos.filter(todo => !todo.completed);
      saveTodos();
    }

    // Event Listeners
    addTodoBtn.addEventListener('click', addTodo);
    newTodoInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTodo();
    });
    filterAllBtn.addEventListener('click', () => setFilter('all'));
    filterActiveBtn.addEventListener('click', () => setFilter('active'));
    filterCompletedBtn.addEventListener('click', () => setFilter('completed'));
    clearCompletedBtn.addEventListener('click', clearCompleted);

    // Initial render
    renderTodos();
  </script>
</body>
</html>
