<!-- pelican.svg -->
<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Bicycle -->
  <circle cx="150" cy="180" r="40" fill="none" stroke="#8B4513" stroke-width="8"/>
  <circle cx="250" cy="180" r="40" fill="none" stroke="#8B4513" stroke-width="8"/>
  <line x1="190" y1="140" x2="210" y2="140" stroke="#8B4513" stroke-width="6"/>
  <line x1="190" y1="140" x2="150" y2="180" stroke="#8B4513" stroke-width="6"/>
  <line x1="210" y1="140" x2="250" y2="180" stroke="#8B4513" stroke-width="6"/>
  <line x1="150" y1="180" x2="250" y2="180" stroke="#8B4513" stroke-width="6"/>
  <line x1="200" y1="140" x2="200" y2="100" stroke="#8B4513" stroke-width="6"/>
  <line x1="200" y1="100" x2="180" y2="80" stroke="#8B4513" stroke-width="6"/>
  
  <!-- Pelican body -->
  <ellipse cx="200" cy="120" rx="30" ry="20" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  
  <!-- Pelican head -->
  <circle cx="230" cy="110" r="15" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
  
  <!-- Pelican bill -->
  <polygon points="245,110 270,115 245,120" fill="#FFA500" stroke="#000000" stroke-width="1"/>
  
  <!-- Pelican eye -->
  <circle cx="235" cy="105" r="3" fill="#000000"/>
  
  <!-- Pelican wings -->
  <path d="M180,110 Q160,90 170,120 Q180,140 190,120 Z" fill="#F0F0F0" stroke="#000000" stroke-width="1"/>
  <path d="M220,110 Q240,90 230,120 Q220,140 210,120 Z" fill="#F0F0F0" stroke="#000000" stroke-width="1"/>
  
  <!-- Pelican legs -->
  <line x1="190" y1="140" x2="185" y2="160" stroke="#FFA500" stroke-width="3"/>
  <line x1="210" y1="140" x2="215" y2="160" stroke="#FFA500" stroke-width="3"/>
  
  <!-- Pelican feet -->
  <path d="M185,160 L180,165 L190,165 Z" fill="#FFA500"/>
  <path d="M215,160 L220,165 L210,165 Z" fill="#FFA500"/>
</svg>