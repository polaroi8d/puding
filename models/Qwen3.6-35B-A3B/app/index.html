<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px 16px; }
.app { background: #fff; width: 100%; max-width: 480px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 24px; }
h1 { text-align: center; margin-bottom: 20px; color: #333; }
.input-row { display: flex; gap: 8px; margin-bottom: 16px; }
.input-row input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
.input-row button { padding: 8px 16px; background: #4a90d9; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
.input-row button:hover { background: #357abd; }
.filters { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; }
.filters button { padding: 6px 14px; border: 1px solid #ccc; background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
.filters button.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
.filter-label { display: flex; align-items: center; justify-content: center; gap: 4px; }
#todo-list { list-style: none; }
.todo-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; }
.todo-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
.todo-text { flex: 1; font-size: 14px; word-break: break-word; }
.todo-text.completed { text-decoration: line-through; color: #999; }
.delete-btn { background: none; border: none; color: #d9534f; cursor: pointer; font-size: 18px; padding: 4px 8px; flex-shrink: 0; }
.delete-btn:hover { color: #c9302c; }
.footer { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid #eee; font-size: 13px; color: #666; }
.footer button { background: none; border: 1px solid #d9534f; color: #d9534f; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.footer button:hover { background: #d9534f; color: #fff; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <h1>Todos</h1>
  <div class="input-row">
    <input type="text" id="new-todo-input" placeholder="What needs to be done?" autocomplete="off">
    <button id="add-todo">Add</button>
  </div>
  <div class="filters">
    <button data-testid="filter-all" class="active">All</button>
    <button data-testid="filter-active">Active</button>
    <button data-testid="filter-completed">Completed</button>
  </div>
  <ul data-testid="todo-list" id="todo-list"></ul>
  <div class="footer">
    <span data-testid="active-count">0</span>
    <button id="clear-completed">Clear completed</button>
  </div>
</div>

<script>
(function() {
  var STORAGE_KEY = 'todos';
  var todos = [];
  var currentFilter = 'all';

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          todos = parsed;
          return;
        }
      }
    } catch(e) {}
    todos = [];
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function addTodo(text) {
    text = text.trim();
    if (!text) return;
    todos.push({ id: crypto.randomUUID(), text: text, completed: false });
    save();
    render();
  }

  function toggleTodo(id) {
    var todo = todos.find(function(t) { return t.id === id; });
    if (todo) {
      todo.completed = !todo.completed;
      save();
      render();
    }
  }

  function deleteTodo(id) {
    todos = todos.filter(function(t) { return t.id !== id; });
    save();
    render();
  }

  function clearCompleted() {
    todos = todos.filter(function(t) { return !t.completed; });
    save();
    render();
  }

  function setActiveFilter(filter) {
    currentFilter = filter;
    render();
  }

  function getFilteredTodos() {
    if (currentFilter === 'active') return todos.filter(function(t) { return !t.completed; });
    if (currentFilter === 'completed') return todos.filter(function(t) { return t.completed; });
    return todos;
  }

  function render() {
    var listEl = document.getElementById('todo-list');
    var filtered = getFilteredTodos();
    var activeCount = todos.filter(function(t) { return !t.completed; }).length;

    document.getElementById('active-count').textContent = String(activeCount);

    listEl.innerHTML = '';
    for (var i = 0; i < filtered.length; i++) {
      var todo = filtered[i];
      var li = document.createElement('li');
      li.setAttribute('data-testid', 'todo-item');
      li.setAttribute('data-completed', String(todo.completed));

      var checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.setAttribute('data-testid', 'toggle-todo');
      checkbox.checked = todo.completed;
      checkbox.addEventListener('change', (function(id) {
        return function() { toggleTodo(id); };
      })(todo.id));

      var textSpan = document.createElement('span');
      textSpan.setAttribute('data-testid', 'todo-text');
      textSpan.textContent = todo.text;
      if (todo.completed) textSpan.classList.add('completed');

      var deleteBtn = document.createElement('button');
      deleteBtn.setAttribute('data-testid', 'delete-todo');
      deleteBtn.textContent = '\u00D7';
      deleteBtn.addEventListener('click', (function(id) {
        return function() { deleteTodo(id); };
      })(todo.id));

      li.appendChild(checkbox);
      li.appendChild(textSpan);
      li.appendChild(deleteBtn);
      listEl.appendChild(li);
    }

    var filterBtns = document.querySelectorAll('.filters button');
    for (var j = 0; j < filterBtns.length; j++) {
      var btn = filterBtns[j];
      var key = btn.getAttribute('data-testid');
      if (key === 'filter-all' && currentFilter === 'all') btn.classList.add('active');
      else if (key === 'filter-active' && currentFilter === 'active') btn.classList.add('active');
      else if (key === 'filter-completed' && currentFilter === 'completed') btn.classList.add('active');
      else btn.classList.remove('active');
    }
  }

  var input = document.getElementById('new-todo-input');
  var addBtn = document.getElementById('add-todo');
  var clearBtn = document.getElementById('clear-completed');

  addBtn.addEventListener('click', function() {
    addTodo(input.value);
    input.value = '';
  });

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      addTodo(input.value);
      input.value = '';
    }
  });

  clearBtn.addEventListener('click', clearCompleted);

  var filterBtns = document.querySelectorAll('.filters button');
  for (var i = 0; i < filterBtns.length; i++) {
    filterBtns[i].addEventListener('click', (function() {
      return function() {
        setActiveFilter(this.getAttribute('data-testid').replace('filter-', ''));
      };
    })(i));
  }

  load();
  render();
})();
</script>
</body>
</html>
